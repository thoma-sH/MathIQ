<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MathIQ — math problems, walked through</title>
    <meta name="description" content="A guided math tutor for college courses. Type a problem, walk through it one line at a time." />

    <!-- Open Graph / social previews. Per-share dynamic tags would
         require a Vercel edge function rendering HTML with the specific
         shareId's data; for now these are generic but make pasted MathIQ
         links look professional in iMessage / Discord / Twitter / Slack. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MathIQ" />
    <meta property="og:title" content="MathIQ — Daily Math Challenge" />
    <meta property="og:description" content="One math problem a day, randomly picked from 109 college topics. Solve it on paper, snap a photo, get graded. Wordle-style daily math." />
    <meta property="og:image" content="https://mathiq.io/icon-192.png" />
    <meta property="og:url" content="https://mathiq.io" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MathIQ — Daily Math Challenge" />
    <meta name="twitter:description" content="One math problem a day. Solve, photo-grade, share." />
    <meta name="twitter:image" content="https://mathiq.io/icon-192.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#d4e26a" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MathIQ" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Roboto+Slab:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Cloudflare Turnstile (abuse protection for anonymous daily-challenge grading) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
