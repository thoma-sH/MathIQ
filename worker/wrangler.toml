name = "mathiq-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY
#   CLERK_SECRET_KEY
#   OPENROUTER_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET

# KV namespace for subscription state + webhook idempotency.
# Create with: `wrangler kv namespace create USAGE`
# Then paste the returned `id` below.
[[kv_namespaces]]
binding = "USAGE"
id = "a6fae18bec5c438d8f4ad82c8026b4cd"

# Durable Object for atomic daily rate-limit counters. Each user/IP gets a
# single-threaded actor so concurrent requests can't both bypass the ceiling.
[[durable_objects.bindings]]
name = "USAGE_DO"
class_name = "UsageCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UsageCounter"]

[vars]
# Allowed origins for CORS. Comma-separated.
ALLOWED_ORIGINS = "https://mathiq.io,https://www.mathiq.io,https://math-iq.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:5175"

# Clerk publishable key — safe to commit (client-visible by design).
# After Clerk setup, paste your `pk_test_...` or `pk_live_...` here.
CLERK_PUBLISHABLE_KEY = "pk_test_ZXF1YWwtbWFsYW11dGUtMzIuY2xlcmsuYWNjb3VudHMuZGV2JA"

# Comma-separated Clerk user IDs (user_xxx...) granted MathIQ+ tier manually
# (dev override / comp accounts). Stripe-paid subs are stored in KV via webhook.
PRO_USER_IDS = ""

# Comma-separated Clerk user IDs granted MathIQ Pro tier manually.
# Set to empty string if no manual grants.
MAX_USER_IDS = "user_3DYnEzyeFI36j2JWovhFyBEvRPe"

# Stripe price IDs. Current pricing: Plus $7.99/mo or $47.99/yr (50% off)
# or $25.99 one-time Semester (5 months). Pro $19.99/mo or $107.99/yr
# (55% off) or $64.99 one-time Semester. The `_OLD` block below holds the
# pre-reshape monthly/annual price IDs so existing subscribers' webhooks
# still resolve to their tier — leave those alone unless you're sure no
# grandfathered subs remain.
STRIPE_PRICE_PLUS_MONTHLY = "price_1TW78XHJHOfcH2xmkZFDsdtz"
STRIPE_PRICE_PLUS_ANNUAL  = "price_1TX50oHJHOfcH2xmCrYGV8RP"
STRIPE_PRICE_PLUS_SEMESTER = "price_1TX51ZHJHOfcH2xm5wCInQW8"
STRIPE_PRICE_PRO_MONTHLY  = "price_1TX54pHJHOfcH2xmZXBafXCc"
STRIPE_PRICE_PRO_ANNUAL   = "price_1TX55OHJHOfcH2xmd9uhWcVp"
STRIPE_PRICE_PRO_SEMESTER = "price_1TX55qHJHOfcH2xmPkffVYOu"

# Grandfathered (deactivated-in-Stripe) price IDs. Pre-populated with the
# current live IDs so that once the three above are swapped to new IDs,
# webhooks for existing $29.99 / $59.88 / $239.88 subscribers still
# resolve to their tier instead of silently downgrading them to free.
# Leave empty when there are no grandfathered subscribers (e.g. dev).
STRIPE_PRICE_PRO_MONTHLY_OLD = "price_1TW78WHJHOfcH2xmEiMUYsWn"
STRIPE_PRICE_PLUS_ANNUAL_OLD = "price_1TW78XHJHOfcH2xm3ofmLa2b"
STRIPE_PRICE_PRO_ANNUAL_OLD  = "price_1TW78YHJHOfcH2xm35zn1EKi"

# Where Stripe redirects after Checkout success/cancel and Portal exit.
# Use your client origin + the Settings route.
STRIPE_SUCCESS_URL       = "https://mathiq.io/?billing=success"
STRIPE_CANCEL_URL        = "https://mathiq.io/?billing=cancelled"
STRIPE_PORTAL_RETURN_URL = "https://mathiq.io/"
