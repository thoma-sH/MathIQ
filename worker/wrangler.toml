name = "mathiq-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY
#   CLERK_SECRET_KEY
#   OPENROUTER_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET

# KV namespace for subscription state + webhook idempotency.
# Create with: `wrangler kv namespace create USAGE`
# Then paste the returned `id` below.
[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Durable Object for atomic daily rate-limit counters. Each user/IP gets a
# single-threaded actor so concurrent requests can't both bypass the ceiling.
[[durable_objects.bindings]]
name = "USAGE_DO"
class_name = "UsageCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UsageCounter"]

[vars]
# Allowed origins for CORS. Comma-separated.
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,http://localhost:5175"

# Clerk publishable key — safe to commit (client-visible by design).
# After Clerk setup, paste your `pk_test_...` or `pk_live_...` here.
CLERK_PUBLISHABLE_KEY = "pk_test_ZXF1YWwtbWFsYW11dGUtMzIuY2xlcmsuYWNjb3VudHMuZGV2JA"

# Comma-separated Clerk user IDs (user_xxx...) granted MathIQ+ tier manually
# (dev override / comp accounts). Stripe-paid subs are stored in KV via webhook.
PRO_USER_IDS = "user_3DYnEzyeFI36j2JWovhFyBEvRPe"

# Comma-separated Clerk user IDs granted MathIQ Pro tier manually.
# Set to empty string if no manual grants.
MAX_USER_IDS = ""

# Stripe price IDs — create products + prices in the Stripe Dashboard, then
# paste the `price_...` IDs here. Test-mode IDs for dev, live-mode for prod.
STRIPE_PRICE_PLUS_MONTHLY = "price_1TVyPgHWJKrZNHAOuyN7vdA7"
STRIPE_PRICE_PLUS_ANNUAL  = "price_1TVyPgHWJKrZNHAOrOJlw4pT"
STRIPE_PRICE_PRO_MONTHLY  = "price_1TVyTRHWJKrZNHAObwe6cNaG"
STRIPE_PRICE_PRO_ANNUAL   = "price_1TVyTRHWJKrZNHAOD8c3PX5t"

# Where Stripe redirects after Checkout success/cancel and Portal exit.
# Use your client origin + the Settings route.
STRIPE_SUCCESS_URL       = "http://localhost:5173/?billing=success"
STRIPE_CANCEL_URL        = "http://localhost:5173/?billing=cancelled"
STRIPE_PORTAL_RETURN_URL = "http://localhost:5173/"
