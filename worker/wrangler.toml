name = "mathiq-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY
#   CLERK_SECRET_KEY

# KV namespace for daily usage counters.
# Create with: `wrangler kv namespace create USAGE`
# Then paste the returned `id` below.
[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Allowed origins for CORS. Comma-separated.
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,http://localhost:5175"

# Clerk publishable key — safe to commit (client-visible by design).
# After Clerk setup, paste your `pk_test_...` or `pk_live_...` here.
CLERK_PUBLISHABLE_KEY = "REPLACE_WITH_CLERK_PUBLISHABLE_KEY"
