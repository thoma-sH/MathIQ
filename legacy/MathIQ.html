<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MathIQ — Mental math, every level</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Roboto+Slab:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #16110a;
    --paper: #f4efe6;
    --paper-2: #ebe6dc;
    --accent: #ff5b1f;
    --hair: rgba(22, 17, 10, 0.12);
    --hair-strong: rgba(22, 17, 10, 0.18);
    --muted: rgba(22, 17, 10, 0.55);
    --serif: "Instrument Serif", "Times New Roman", serif;
    --slab: "Roboto Slab", Georgia, serif;
    --sans: "Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body { font-family: var(--sans); font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  ::selection { background: var(--accent); color: var(--paper); }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
  @keyframes blink { 50% { opacity: 0 } }

  .fade-in { animation: fadeIn 240ms cubic-bezier(.2,.7,.3,1) both; }
  /* hide scrollbars in drill chrome */
  .no-scrollbar::-webkit-scrollbar { display: none; }

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ─── Design tokens ────────────────────────────────────────────────────────
const T = {
  ink: '#16110a',
  paper: '#f4efe6',
  paper2: '#ebe6dc',
  accent: '#ff5b1f',
  hair: 'rgba(22, 17, 10, 0.12)',
  hairStrong: 'rgba(22, 17, 10, 0.18)',
  muted: 'rgba(22, 17, 10, 0.55)',
  serif: '"Instrument Serif", "Times New Roman", serif',
  slab: '"Roboto Slab", Georgia, serif',
  sans: '"Inter Tight", ui-sans-serif, system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, monospace',
};

// ─── Problem generators (arithmetic → calculus) ──────────────────────────
const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

const GENERATORS = {
  arithmetic: () => {
    const kind = pick(['mul', 'add', 'sub', 'div', 'square', 'percent']);
    if (kind === 'mul') {
      const a = rnd(11, 99), b = rnd(2, 9);
      return { q: `${a} × ${b}`, a: a * b, kicker: 'two-digit by one', topic: 'Arith.' };
    }
    if (kind === 'add') {
      const a = rnd(20, 199), b = rnd(20, 199);
      return { q: `${a} + ${b}`, a: a + b, kicker: 'three-digit sum', topic: 'Arith.' };
    }
    if (kind === 'sub') {
      const a = rnd(120, 500), b = rnd(20, 119);
      return { q: `${a} − ${b}`, a: a - b, kicker: 'difference', topic: 'Arith.' };
    }
    if (kind === 'div') {
      const b = rnd(2, 12), q = rnd(3, 25);
      return { q: `${b * q} ÷ ${b}`, a: q, kicker: 'clean division', topic: 'Arith.' };
    }
    if (kind === 'square') {
      const a = rnd(11, 25);
      return { q: `${a}²`, a: a * a, kicker: 'square', topic: 'Arith.' };
    }
    if (kind === 'percent') {
      const pct = pick([10, 15, 20, 25, 50]);
      const n = rnd(2, 20) * 20;
      return { q: `${pct}% of ${n}`, a: (pct * n) / 100, kicker: 'percent', topic: 'Arith.' };
    }
  },
  algebra: () => {
    const kind = pick(['linear', 'pow', 'log']);
    if (kind === 'linear') {
      const m = rnd(2, 9), x = rnd(2, 12), b = rnd(1, 30);
      return { q: `${m}x + ${b} = ${m * x + b}, x = ?`, a: x, kicker: 'solve for x', topic: 'Algebra' };
    }
    if (kind === 'pow') {
      const base = pick([2, 3, 4, 5]);
      const exp = rnd(2, 4);
      return { q: `${base}^${exp}`, a: Math.pow(base, exp), kicker: 'powers', topic: 'Algebra' };
    }
    if (kind === 'log') {
      const base = pick([2, 3]);
      const exp = rnd(2, 5);
      return { q: `log_${base} ${Math.pow(base, exp)}`, a: exp, kicker: 'logs', topic: 'Algebra' };
    }
  },
  trig: () => {
    const angles = [
      ['sin 0°', 0], ['sin 30°', 0.5], ['sin 45°', '√2/2'], ['sin 60°', '√3/2'], ['sin 90°', 1],
      ['cos 0°', 1], ['cos 30°', '√3/2'], ['cos 45°', '√2/2'], ['cos 60°', 0.5], ['cos 90°', 0],
      ['tan 0°', 0], ['tan 30°', '√3/3'], ['tan 45°', 1], ['tan 60°', '√3'],
    ];
    const [q, a] = pick(angles);
    return { q, a, kicker: 'unit circle', topic: 'Trig.' };
  },
  calculus: () => {
    const kind = pick(['deriv', 'integ', 'limit']);
    if (kind === 'deriv') {
      const c = rnd(2, 9), n = rnd(2, 5);
      return { q: `d/dx (${c}x^${n})`, a: `${c * n}x^${n - 1}`.replace('x^1', 'x'), kicker: 'power rule', topic: 'Calc.' };
    }
    if (kind === 'integ') {
      const c = rnd(2, 9), n = rnd(1, 4);
      return { q: `∫ ${c}x^${n} dx`, a: `${c / (n + 1) === Math.floor(c / (n + 1)) ? c / (n + 1) : c + '/' + (n + 1)}x^${n + 1}`, kicker: 'integrate', topic: 'Calc.' };
    }
    if (kind === 'limit') {
      const fns = [
        ['lim x→0 sin(x)/x', 1],
        ['lim x→∞ 1/x', 0],
        ['lim x→0 (e^x − 1)/x', 1],
        ['lim x→0 (1 − cos x)/x', 0],
      ];
      const [q, a] = pick(fns);
      return { q, a, kicker: 'limits', topic: 'Calc.' };
    }
  },
  discrete: () => {
    const kind = pick(['gcd', 'mod', 'fact']);
    if (kind === 'gcd') {
      const a = rnd(12, 60), b = rnd(8, 36);
      const g = (function gcd(x, y) { return y ? gcd(y, x % y) : x; })(a, b);
      return { q: `gcd(${a}, ${b})`, a: g, kicker: 'gcd', topic: 'Discrete' };
    }
    if (kind === 'mod') {
      const a = rnd(20, 99), b = rnd(3, 12);
      return { q: `${a} mod ${b}`, a: a % b, kicker: 'modulo', topic: 'Discrete' };
    }
    if (kind === 'fact') {
      const n = rnd(3, 6);
      return { q: `${n}!`, a: [1, 1, 2, 6, 24, 120, 720][n], kicker: 'factorial', topic: 'Discrete' };
    }
  },
};

const DOMAINS = ['arithmetic', 'algebra', 'trig', 'calculus', 'discrete'];

function genProblem(domain) {
  const d = domain === 'mixed' ? pick(DOMAINS) : domain;
  return GENERATORS[d]();
}

const checkAnswer = (input, answer) => {
  if (input == null) return false;
  const i = String(input).trim();
  if (i === '') return false;
  if (typeof answer === 'number') {
    const n = Number(i);
    return !Number.isNaN(n) && n === answer;
  }
  // string: normalize spacing + case
  const norm = (s) => String(s).toLowerCase().replace(/\s+/g, '').replace(/×/g, '*');
  return norm(i) === norm(answer);
};

// ─── Reusable label/kicker bits ──────────────────────────────────────────
const Kicker = ({ children, color, style }) => (
  <div style={{
    fontFamily: T.mono, fontSize: 10, letterSpacing: '0.2em',
    textTransform: 'uppercase', color: color || T.muted, ...style,
  }}>{children}</div>
);

const Rule = ({ thick, color, style }) => (
  <div style={{ height: 0, borderTop: `${thick ? 2 : 1}px solid ${color || T.ink}`, ...style }} />
);

          ))}
        </nav>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>

          fontFamily: T.mono, fontSize: 11, letterSpacing: '0.15em',
          padding: '6px 12px', background: T.ink, color: T.paper,
        }}>STREAK · {String(streak).padStart(3, '0')}</span>
        <div style={{

}

}

// ─── 01 PULSE ────────────────────────────────────────────────────────────
function PulseDrill({ setRoute, domain, onComplete, drillTimer }) {
  const [bpm, setBpm] = useState(72);
  const [tick, setTick] = useState(0);
  const [problem, setProblem] = useState(() => genProblem(domain));
  const [answer, setAnswer] = useState('');
  const [streak, setStreak] = useState(0);
  const [solved, setSolved] = useState(0);
  const [start] = useState(() => Date.now());
  const [running, setRunning] = useState(true);
  const [timeLeft, setTimeLeft] = useState(drillTimer || 60);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {

function StreamDrill({ setRoute, domain, onComplete }) {
  const [score, setScore] = useState(0);
  const [combo, setCombo] = useState(0);
  const [solved, setSolved] = useState(0);
  const [problems, setProblems] = useState(() =>
    Array.from({ length: 7 }, (_, i) => ({ ...genProblem(domain), id: i, age: i }))
  );
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  const [timeLeft, setTimeLeft] = useState(120);
  const [running, setRunning] = useState(true);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setProblems(prev => {
        const next = prev.map(p => ({ ...p, age: p.age + 1 }));
        if (next.length > 0 && next[0].age > 18) next.shift();
        next.push({ ...genProblem(domain), id: Date.now() + Math.random(), age: 0 });
        return next.slice(-9);
      });
    }, 2200);
    return () => clearInterval(id);
  }, [running, domain]);

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setTimeLeft(t => Math.max(0, t - 1)), 1000);
    return () => clearInterval(id);
  }, [running]);

  useEffect(() => {
    if (timeLeft === 0 && running) {
      setRunning(false);
      onComplete?.({ solved, score, mode: 'Stream', durationSec: 120 });
    }
  }, [timeLeft]);

  const submit = () => {
    const target = problems[0];
    if (!target) return;
    if (checkAnswer(input, target.a)) {
      setScore(s => s + 50 * Math.max(combo + 1, 1));
      setCombo(c => c + 1);
      setSolved(s => s + 1);
    } else {
      setCombo(0);
    }
    setInput('');
    setProblems(prev => prev.slice(1));
  };

  const target = problems[0] || { q: '—', a: 0, topic: '—', age: 0 };
  const HAIR = 'rgba(22,17,10,0.18)';

  return (
    <div style={{
      position: 'relative', width: '100%', minHeight: 'calc(100vh - 60px)',
      background: T.paper, color: T.ink, fontFamily: T.sans,
      display: 'grid', gridTemplateRows: 'auto auto 1fr auto', overflow: 'hidden',
    }}>
      <DrillBack onClick={() => setRoute({ name: 'drills' })} />

      <div style={{ padding: '14px 32px 8px', display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'baseline', borderBottom: `2px solid ${T.ink}` }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', paddingLeft: 80 }}>Vol. III · No. 142 · Stream Edition</div>
        <div style={{ fontFamily: T.serif, fontSize: 32, textAlign: 'center', lineHeight: 1 }}>The Ledger</div>
        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', textAlign: 'right' }}>Session · live</div>
      </div>

      <div style={{ padding: '6px 32px', display: 'flex', justifyContent: 'space-between', borderBottom: `1px solid ${T.ink}`, fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
        <span><b>Score</b> · <span style={{ fontFamily: T.slab, fontWeight: 600 }}>{score.toLocaleString()}</span></span>
        <span><b>Combo</b> · <span style={{ fontFamily: T.slab, fontWeight: 600, color: T.accent }}>×{combo}</span></span>
        <span><b>Solved</b> · {solved}</span>
        <span><b>Time</b> · <span style={{ color: timeLeft < 15 ? T.accent : T.ink }}>{timeLeft}s</span></span>
      </div>

      <main style={{ display: 'grid', gridTemplateColumns: '280px minmax(0,1fr) 280px', position: 'relative' }}>
        <div style={{ borderRight: `1px solid ${T.ink}`, padding: '20px 24px', overflow: 'hidden' }}>
          <Kicker style={{ marginBottom: 10, paddingBottom: 6, borderBottom: `1px solid ${T.ink}` }}>Incoming ↓</Kicker>
          {problems.slice(1, 7).map((p, i) => (
            <div key={p.id} style={{ padding: '10px 0', borderBottom: `1px dotted ${HAIR}`, opacity: 1 - i * 0.13 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: T.mono, fontSize: 9, letterSpacing: '0.12em', opacity: 0.6, textTransform: 'uppercase' }}>
                <span>{p.topic}</span>
                <span style={{ fontFamily: T.slab }}>+{Math.max(2, 20 - p.age * 1.5).toFixed(0)}pt</span>
              </div>
              <div style={{ fontFamily: T.slab, fontSize: 22, fontWeight: 500, marginTop: 2 }}>{p.q}</div>
            </div>
          ))}
        </div>

        <div style={{ display: 'grid', placeItems: 'center', position: 'relative', padding: 32, minWidth: 0 }}>
          <div style={{ textAlign: 'center', maxWidth: '100%' }}>
            <Kicker style={{ letterSpacing: '0.25em', marginBottom: 14 }}>
              [ {target.topic} · expires in {Math.max(0, 18 - target.age)}s ]
            </Kicker>
            <div style={{ fontFamily: T.serif, fontSize: 22, fontStyle: 'italic', opacity: 0.6, marginBottom: 16 }}>
              "the bell rings every two seconds"
            </div>
            <div className="fade-in" key={target.id} style={{ fontFamily: T.slab, fontSize: 'clamp(72px, 12vw, 156px)', lineHeight: 0.95, letterSpacing: '-0.04em', fontWeight: 600 }}>

            <div style={{ marginTop: 28, display: 'inline-flex', alignItems: 'center', border: `1.5px solid ${T.ink}`, background: '#fff' }}>
              <span style={{ padding: '0 16px', color: T.accent, fontFamily: T.slab, fontSize: 22 }}>›</span>
              <input
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') submit(); }}
                placeholder="solve"
                style={{ background: 'transparent', border: 'none', outline: 'none', fontFamily: T.slab, fontSize: 24, fontWeight: 500, padding: '12px 0', width: 200, textAlign: 'center', color: T.ink }}

            </div>

          {[
            { l: 'Arithmetic', v: 94 }, { l: 'Algebra', v: 81 }, { l: 'Calculus', v: 62 },
            { l: 'Trigonometry', v: 73 }, { l: 'Statistics', v: 55 }, { l: 'Discrete', v: 88 },
          ].map(d => (
            <div key={d.l} style={{ marginBottom: 12 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 3 }}>
                <span>{d.l}</span>
                <span style={{ fontFamily: T.slab, opacity: 0.7 }}>{d.v}</span>
              </div>
              <div style={{ height: 4, background: HAIR, position: 'relative' }}>
                <div style={{ position: 'absolute', inset: 0, width: `${d.v}%`, background: T.ink }} />
              </div>
            </div>
          ))}
        </div>
      </main>

      <footer style={{ padding: '8px 32px', borderTop: `2px solid ${T.ink}`, display: 'flex', justifyContent: 'space-between', fontFamily: T.mono, fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', opacity: 0.7 }}>
        <span>Enter · file · Esc · pause</span>
        <span style={{ color: T.accent }}>● Recording {String(Math.floor((120 - timeLeft) / 60)).padStart(2, '0')}:{String((120 - timeLeft) % 60).padStart(2, '0')}</span>
      </footer>
    </div>
  );

function VoiceDrill({ setRoute, domain, onComplete }) {
  const [phase, setPhase] = useState('listening');
  const [tick, setTick] = useState(0);
  const [transcript, setTranscript] = useState([
    { who: 'AI', text: '372', kind: 'problem', tag: 'WARM-UP' },
    { who: 'YOU', text: 'three hundred seventy-two', kind: 'echo' },
    { who: 'AI', text: 'Now divide by twelve.', kind: 'problem' },
    { who: 'YOU', text: 'thirty-one', kind: 'answer' },
    { who: 'AI', text: 'Correct. Subtract seven.', kind: 'problem' },
    { who: 'YOU', text: 'twenty-four', kind: 'answer' },
    { who: 'AI', text: 'Now square it.', kind: 'problem' },
  ]);
  const [problem, setProblem] = useState(() => genProblem(domain));
  const [input, setInput] = useState('');
  const [solved, setSolved] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {
    const t = setInterval(() => setTick(x => x + 1), 80);
    const p = setInterval(() => setPhase(ph => ph === 'listening' ? 'thinking' : ph === 'thinking' ? 'speaking' : 'listening'), 2400);
    const e = setInterval(() => setElapsed(x => x + 1), 1000);
    return () => { clearInterval(t); clearInterval(p); clearInterval(e); };
  }, []);

  const submit = () => {
    if (checkAnswer(input, problem.a)) {
      setTranscript(t => [...t, { who: 'YOU', text: input, kind: 'answer' }, { who: 'AI', text: 'Correct. Next: ' + problem.q, kind: 'problem' }].slice(-8));
      setSolved(s => s + 1);
    } else {
      setTranscript(t => [...t, { who: 'YOU', text: input, kind: 'wrong' }, { who: 'AI', text: `Not quite — answer was ${problem.a}.`, kind: 'problem' }].slice(-8));
    }
    setProblem(genProblem(domain));
    setInput('');
  };

  const accent = '#7c9c7e';
  const bg = '#eef0e8';
  const bars = Array.from({ length: 64 }, (_, i) => {
    const offset = i * 0.4;
    const base = phase === 'speaking' ? 0.5 : phase === 'listening' ? 0.3 : 0.15;
    const amp = phase === 'thinking' ? 0.05 : 0.45;
    return base + Math.abs(Math.sin(tick * 0.15 + offset)) * amp;
  });

  return (
    <div style={{
      position: 'relative', width: '100%', minHeight: 'calc(100vh - 60px)',
      background: bg, color: '#1f2a1f',
      fontFamily: T.sans, display: 'grid', gridTemplateRows: 'auto 1fr auto',
    }}>
      <DrillBack onClick={() => setRoute({ name: 'drills' })} />

      <header style={{ padding: '24px 36px 24px 80px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            width: 8, height: 8, borderRadius: 4, background: accent,
            boxShadow: `0 0 0 ${4 + Math.sin(tick * 0.15) * 4}px ${accent}30`,
          }} />
          <span style={{ fontSize: 14, fontWeight: 500, letterSpacing: '-0.01em' }}>MathIQ Voice</span>
          <span style={{ fontSize: 13, opacity: 0.5 }}>· session in progress</span>
        </div>
        <div style={{ display: 'flex', gap: 28, fontSize: 12, opacity: 0.7 }}>
          <span>{String(Math.floor(elapsed / 60)).padStart(2, '0')}:{String(elapsed % 60).padStart(2, '0')} elapsed</span>
          <span>{solved} solved</span>
          <span>tutor: <b style={{ fontWeight: 600 }}>Iris</b></span>
        </div>
      </header>

      <main style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) 380px', gap: 0 }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 40, padding: 40 }}>
          <div style={{ textAlign: 'center', maxWidth: 560 }}>
            <Kicker style={{ marginBottom: 18 }}>
              {phase === 'listening' ? 'Iris is listening…' : phase === 'thinking' ? 'thinking' : 'Iris is speaking'}
            </Kicker>
            <div style={{ fontSize: 'clamp(36px, 5vw, 56px)', lineHeight: 1.1, letterSpacing: '-0.03em', fontFamily: T.serif }}>
              <span style={{ opacity: 0.4 }}>"</span>{problem.q}<span style={{ opacity: 0.4 }}>"</span>
            </div>
            <div style={{ fontSize: 13, opacity: 0.5, marginTop: 12 }}>{problem.kicker}</div>
          </div>

          <div style={{ display: 'flex', gap: 4, alignItems: 'center', height: 100 }}>
            {bars.map((h, i) => (
              <div key={i} style={{ width: 4, height: `${h * 100}%`, background: accent, borderRadius: 2, opacity: 0.4 + h * 0.6, transition: 'height 80ms linear' }} />
            ))}
          </div>

          <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' }}>
            <div style={{ display: 'flex', border: `2px solid #1f2a1f30`, borderRadius: 28, background: '#fff' }}>
              <input ref={inputRef}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') submit(); }}
                placeholder="say or type your answer"
                style={{ background: 'transparent', border: 'none', outline: 'none', fontSize: 16, padding: '14px 22px', width: 240, fontFamily: T.sans }}
              />

function ArenaDrill({ setRoute, domain, onComplete }) {
  const [you, setYou] = useState({ score: 0 });
  const [ai, setAi] = useState({ score: 0 });
  const [round, setRound] = useState(1);
  const TOTAL_ROUNDS = 15;
  const [problem, setProblem] = useState(() => genProblem(domain));
  const [input, setInput] = useState('');
  const [yourBar, setYourBar] = useState(0);
  const [aiBar, setAiBar] = useState(0);
  const [done, setDone] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {
    if (done) return;
    setYourBar(0); setAiBar(0);
    const speed = 0.012 + Math.random() * 0.018;
    const id = setInterval(() => setAiBar(b => {
      const nb = b + speed;
      if (nb >= 1) {
        clearInterval(id);
        // AI scores
        setAi(a => ({ score: a.score + 1 }));
        nextRound(false);
        return 1;
      }
      return nb;
    }), 100);
    return () => clearInterval(id);
  }, [round, done]);

  const nextRound = (youScored) => {
    if (round >= TOTAL_ROUNDS) {
      setDone(true);
      onComplete?.({ youScore: you.score + (youScored ? 1 : 0), aiScore: ai.score + (youScored ? 0 : 1), mode: 'Arena' });
      return;
    }
    setRound(r => r + 1);
    setProblem(genProblem(domain));
    setInput('');
  };

  const submit = () => {
    if (checkAnswer(input, problem.a)) {
      setYou(y => ({ score: y.score + 1 }));
      setYourBar(1);
      setTimeout(() => nextRound(true), 200);
    } else {
      setInput('');
    }
  };

  const youColor = '#ff2d92', aiColor = '#00d4ff';

  return (
    <div style={{
      position: 'relative', width: '100%', minHeight: 'calc(100vh - 60px)',
      background: '#08070d', color: '#fff', fontFamily: T.sans,
      display: 'grid', gridTemplateRows: 'auto auto 1fr auto', overflow: 'hidden',
    }}>
      <DrillBack onClick={() => setRoute({ name: 'drills' })} />

      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none',
        background: `radial-gradient(circle at 25% 50%, ${youColor}25, transparent 50%), radial-gradient(circle at 75% 50%, ${aiColor}25, transparent 50%)`,
      }} />

      <header style={{ padding: '20px 32px 20px 80px', display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: 32, position: 'relative', borderBottom: '1px solid #ffffff10' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ width: 52, height: 52, borderRadius: 26, background: `linear-gradient(135deg, ${youColor}, ${youColor}80)`, display: 'grid', placeItems: 'center', fontSize: 22, fontWeight: 700, boxShadow: `0 0 32px ${youColor}80` }}>K</div>
          <div>
            <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: '0.15em', textTransform: 'uppercase' }}>YOU · ELO 1840</div>
            <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.02em' }}>karina</div>
          </div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.25em', opacity: 0.5, fontFamily: T.mono }}>ROUND</div>
          <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1, fontFamily: T.slab }}>{String(round).padStart(2, '0')}<span style={{ opacity: 0.4 }}>/{TOTAL_ROUNDS}</span></div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, justifyContent: 'flex-end' }}>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: '0.15em', textTransform: 'uppercase' }}>OPP · ELO 2050</div>
            <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.02em' }}>HAIKU.7</div>
          </div>
          <div style={{ width: 52, height: 52, borderRadius: 26, background: `linear-gradient(135deg, ${aiColor}, ${aiColor}80)`, display: 'grid', placeItems: 'center', fontSize: 22, fontWeight: 700, color: '#08070d', boxShadow: `0 0 32px ${aiColor}80` }}>◐</div>
        </div>
      </header>

      <div style={{ padding: '24px 32px 0', position: 'relative', display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: 32 }}>
        <div style={{ fontSize: 'clamp(56px, 8vw, 92px)', fontWeight: 700, letterSpacing: '-0.04em', color: youColor, textShadow: `0 0 40px ${youColor}60`, lineHeight: 1, fontFamily: T.slab }}>{String(you.score).padStart(2, '0')}</div>
        <div style={{ fontSize: 24, opacity: 0.4, fontWeight: 300 }}>vs</div>
        <div style={{ fontSize: 'clamp(56px, 8vw, 92px)', fontWeight: 700, letterSpacing: '-0.04em', color: aiColor, textShadow: `0 0 40px ${aiColor}60`, lineHeight: 1, textAlign: 'right', fontFamily: T.slab }}>{String(ai.score).padStart(2, '0')}</div>

      <main style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 40 }}>

          />

          </button>
        </div>
      </main>

      <footer style={{ padding: '14px 32px', borderTop: '1px solid #ffffff10', display: 'flex', justifyContent: 'space-between', fontSize: 11, opacity: 0.5, fontFamily: T.mono, letterSpacing: '0.15em' }}>
        <span>BEST OF {TOTAL_ROUNDS} · MENTAL ONLY · NO CALC</span>
        <span>↵ SUBMIT · ESC EXIT</span>
        <span style={{ color: youColor }}>● {done ? (you.score > ai.score ? 'YOU WIN' : you.score < ai.score ? 'AI WINS' : 'TIE') : 'LIVE'}</span>
      </footer>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useState(() => {
    const seen = typeof localStorage !== 'undefined' && localStorage.getItem('mathiq:onboard');
    return { name: seen ? 'home' : 'onboard' };
  });
  const [stats, setStats] = useState({ streak: 47, solvedToday: 25 });
  const [lastResult, setLastResult] = useState(null);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape' && (route.name === 'drill' || route.name === 'results')) {
        setRoute({ name: route.name === 'results' ? 'home' : 'drills' });
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [route]);

  const finishOnboard = () => {
    try { localStorage.setItem('mathiq:onboard', '1'); } catch {}
    setRoute({ name: 'home' });
  };

  const completeDrill = (result) => {
    setStats(s => ({ ...s, solvedToday: s.solvedToday + (result.solved || 0) }));
    setLastResult(result);
    setRoute({ name: 'results' });
  };

  if (route.name === 'onboard') return <Onboard onStart={finishOnboard} />;

  // Drills render full-bleed (their own headers); other routes get the top nav.
  if (route.name === 'drill') {
    const props = { setRoute, domain: route.domain || 'mixed', onComplete: completeDrill };
    if (route.mode === 'pulse')  return <PulseDrill {...props} />;
    if (route.mode === 'stream') return <StreamDrill {...props} />;
    if (route.mode === 'voice')  return <VoiceDrill {...props} />;
    if (route.mode === 'layers') return <LayersDrill {...props} />;
    if (route.mode === 'arena')  return <ArenaDrill {...props} />;
  }

  return (
    <>
      <TopNav route={route} setRoute={setRoute} streak={stats.streak} />
      {route.name === 'home' && <Dashboard setRoute={setRoute} stats={stats} />}
      {route.name === 'drills' && <DrillPicker setRoute={setRoute} />}
      {route.name === 'tutor' && <Tutor />}
      {route.name === 'library' && <Library setRoute={setRoute} />}
      {route.name === 'profile' && <Profile stats={stats} />}
      {route.name === 'results' && <Results result={lastResult} setRoute={setRoute} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
